name: Android Mobile

on:
  push:
    paths:
      - "software/mobile/android/**"
      - "software/mobile/branding/**"
      - "software/mobile/mock-data/**"
      - ".github/workflows/mobile-android.yml"
  pull_request:
    paths:
      - "software/mobile/android/**"
      - "software/mobile/branding/**"
      - "software/mobile/mock-data/**"
      - ".github/workflows/mobile-android.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: "8.11.1"
      - name: Build phone and projected app
        run: |
          gradle -p software/mobile/android \
            :app-mobile:assembleDebug \
            test
