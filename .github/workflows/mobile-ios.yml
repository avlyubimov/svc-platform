name: iOS Mobile

on:
  push:
    paths:
      - "software/mobile/ios/**"
      - "software/mobile/mock-data/**"
      - "software/mobile/protocol/examples/**"
      - "tools/select_ios_simulator.py"
      - ".github/workflows/mobile-ios.yml"
  pull_request:
    paths:
      - "software/mobile/ios/**"
      - "software/mobile/mock-data/**"
      - "software/mobile/protocol/examples/**"
      - "tools/select_ios_simulator.py"
      - ".github/workflows/mobile-ios.yml"

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: software/mobile/ios/SVCMobile
        run: xcodegen generate
      - name: Select simulator
        id: simulator
        run: echo "udid=$(python3 tools/select_ios_simulator.py)" >> "$GITHUB_OUTPUT"
      - name: Build and test without CarPlay entitlement
        working-directory: software/mobile/ios/SVCMobile
        run: |
          xcodebuild \
            -project SVCMobile.xcodeproj \
            -scheme SVCMobile \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Compile experimental CarPlay templates without entitlement
        working-directory: software/mobile/ios/SVCMobile
        run: |
          xcodebuild \
            -project SVCMobile.xcodeproj \
            -scheme SVCMobile \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="SVC_CARPLAY_EXPERIMENT" \
            build
