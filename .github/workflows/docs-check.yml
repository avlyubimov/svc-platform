name: Project Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      KICAD_VERSION: "10.0.4"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/mobile_protocol_validation/requirements.txt
      - name: Install protocol validators
        run: pip install -r tools/mobile_protocol_validation/requirements.txt
      - name: Install fixed KiCad CLI
        run: |
          sudo apt-get update
          sudo apt-get install --yes software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --yes "kicad=${KICAD_VERSION}*"
          test "$(kicad-cli --version)" = "${KICAD_VERSION}"
      - name: Run project checks
        run: make check
