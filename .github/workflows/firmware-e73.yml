name: E73 Zephyr Firmware

on:
  push:
    paths:
      - "firmware/radio/e73/**"
      - "firmware/update/**"
      - ".github/workflows/firmware-e73.yml"
  pull_request:
    paths:
      - "firmware/radio/e73/**"
      - "firmware/update/**"
      - ".github/workflows/firmware-e73.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: app
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Set up Zephyr and ARM toolchain
        uses: zephyrproject-rtos/action-zephyr-setup@d042bf33b81383c1388ba45f69e2bf36520e78b8 # v1
        with:
          base-path: app/firmware/radio
          app-path: e73
          toolchains: arm-zephyr-eabi
      - name: Build MCUboot plus E73 application
        working-directory: app/firmware/radio
        run: |
          west build \
            --sysbuild \
            -p always \
            -b nrf52840dk/nrf52840 \
            e73 \
            -d build/e73
      - name: Record development-key boundary
        run: |
          echo "Build validation may use the upstream MCUboot development key."
          echo "No artifact from this job is production-authorized."
